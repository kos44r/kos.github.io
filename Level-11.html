<!DOCTYPE html>
<html lang="en">
<head>
  <title>-11</title>
  <link rel="stylesheet" href="Style.css">
  <script src="Sfunction.js" defer></script>
</head>
<body class="negative">

<div class="login-box">
    <input type="text" id="username" placeholder="answer">
    <button onclick="goToNextLevel()">Submit</button>
</div>



<script>
    
function goToNextLevel() {
    var user = document.getElementById("username").value.trim().toLowerCase();

    if (user === "open") {
        window.location.href = "Level10.1.html";
    } else if (user === "close") {
        window.location.href = "Level10.2.html";
    } else {
        alert("Wrong credentials!");
    }
}
</script>
</div>
</body>
</html>
